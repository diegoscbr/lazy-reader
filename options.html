<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lazy Reader Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    select,
    input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 16px;
    }

    .cloud-fields {
      display: none;
      padding: 16px;
      background: #f5f5f5;
      border-radius: 10px;
    }

    .cloud-fields.visible {
      display: block;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      font-size: 12px;
      color: #4b5563;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #166534;
    }
  </style>
</head>
<body>
  <h1>Lazy Reader Settings</h1>

  <div class="field">
    <label for="provider">Voice Provider</label>
    <select id="provider">
      <option value="local">Local (System Voices)</option>
      <option value="elevenlabs">ElevenLabs (Cloud)</option>
    </select>
  </div>

  <div class="cloud-fields" id="cloudFields">
    <div class="field">
      <label for="apiKey">ElevenLabs API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" spellcheck="false" maxlength="256">
    </div>

    <div class="field">
      <label for="voiceSelect">Voice</label>
      <select id="voiceSelect" disabled>
        <option value="">Enter API key first</option>
      </select>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="loadVoicesBtn">Load Voices</button>
      <button class="btn-secondary" id="previewBtn" disabled>Preview Voice</button>
      <button class="btn-primary" id="saveBtn">Save</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
